name: Test Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-tests:
    name: Smoke Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file for CI
        run: |
          echo "BASE_URL=https://opensource-demo.orangehrmlive.com" >> .env
          echo "BROWSER=chromium" >> .env
          echo "HEADED=false" >> .env
          echo "TIMEOUT=60000" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker compose build --quiet

      - name: Run smoke tests in Docker
        run: docker compose run -e BROWSER=chromium playwright-tests npm run test:smoke

      - name: Generate Enhanced HTML Report
        if: always()
        run: docker compose run playwright-tests npm run report

      - name: Upload enhanced test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-reports
          path: reports/enhanced/
          retention-days: 14

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure-screenshots
          path: screenshots/
          retention-days: 14

      - name: Clean up Docker
        if: always()
        run: docker compose down -v

  regression-tests:
    name: Regression Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: smoke-tests

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file for CI
        run: |
          echo "BASE_URL=https://opensource-demo.orangehrmlive.com" >> .env
          echo "BROWSER=${{ matrix.browser }}" >> .env
          echo "HEADED=false" >> .env
          echo "TIMEOUT=60000" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker compose build --quiet

      - name: Run regression tests in Docker (${{ matrix.browser }})
        run: docker compose run playwright-tests npx cross-env BROWSER=${{ matrix.browser }} cucumber-js src/features -p ${{ matrix.browser }} --tags "not @skip"

      - name: Upload regression reports (${{ matrix.browser }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports-${{ matrix.browser }}
          path: reports/cucumber-${{ matrix.browser }}.html
          retention-days: 14

      - name: Upload failure screenshots (${{ matrix.browser }})
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-failure-screenshots-${{ matrix.browser }}
          path: screenshots/
          retention-days: 14

      - name: Clean up Docker
        if: always()
        run: docker compose down -v